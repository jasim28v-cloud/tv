        /* مشغل الفيديو */
        .tv-screen { flex: 2; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #222; }

        .channel-card { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }

        .channel-card.active { border-color: #ff4757; background: #800000; }

        .ch-number { background: #333; color: #ff4757; padding: 5px 10px; border-radius: 4px; margin-left: 10px; font-weight: bold; min-width: 25px; text-align: center; }
        .ch-name { font-size: 14px; font-weight: 500; }

        /* تخصيص السكرول بار */

    </style>
