<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Smart TV Player 📺</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        video { width: 100%; border: 3px solid #333; border-radius: 15px; background: #111; aspect-ratio: 16/9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 15px 5px; cursor: pointer; border-radius: 8px; font-size: 13px; transition: 0.3s; }
        .btn:hover { background: #ff4757; transform: translateY(-3px); }
        .active { background: #ff4757 !important; border-color: #fff; }
        .info { color: #888; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #ff4757;">مشغل القنوات الخاص بي 📺</h2>
    
    <video id="video" controls autoplay></video>
    
    <div id="status" style="margin-top: 10px; color: #00ffcc;">اختر قناة للتشغيل...</div>

    <div class="grid" id="grid">
        </div>
    
    <p class="info">نصيحة: إذا لم يعمل البث، تأكد من تشغيل VPN قوي لأن هذه السيرفرات محظورة في أغلب الدول العربية.</p>
</div>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const hls = new Hls();

    // هذه هي الروابط المباشرة المستخرجة من السيرفر الذي أرسلته
    const channels = [
        { id: 1, name: "Live Cams", url: "http://live.adultiptv.net/livecams.m3u8" },
        { id: 2, name: "MILF TV", url: "http://live.adultiptv.net/milf.m3u8" },
        { id: 3, name: "Big Tits", url: "http://live.adultiptv.net/bigtits.m3u8" },
        { id: 4, name: "Asian Sex", url: "http://live.adultiptv.net/asian.m3u8" },
        { id: 5, name: "Latina", url: "http://live.adultiptv.net/latina.m3u8" },
        { id: 6, name: "Hardcore", url: "http://live.adultiptv.net/hardcore.m3u8" },
        { id: 7, name: "Lesbian", url: "http://live.adultiptv.net/lesbian.m3u8" },
        { id: 8, name: "Pornstar", url: "http://live.adultiptv.net/pornstar.m3u8" }
    ];

    const grid = document.getElementById('grid');

    channels.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerHTML = `<b>${ch.id}</b><br>${ch.name}`;
        btn.onclick = () => play(ch.url, ch.name, btn);
        grid.appendChild(btn);
    });

    function play(url, name, element) {
        status.innerText = "جاري تحميل: " + name;
        
        if (Hls.isSupported()) {
            hls.destroy();
            const newHls = new Hls();
            newHls.loadSource(url);
            newHls.attachMedia(video);
            newHls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                status.innerText = "بث مباشر: " + name;
            });
            
            newHls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) status.innerText = "⚠️ الرابط معطل أو محظور حالياً.";
            });
        }

        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
