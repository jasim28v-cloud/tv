            padding: 20px;

        .player {

            background-color: #000;
            border-radius: 5px;
            margin-bottom: 15px;

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;

        .btn:hover {

        .channel-list-container {

            margin-bottom: 20px;

        .channel-list-title {
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            color: var(--accent-color);
        }
        .channel-list {
            height: 400px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        .channel-item {
            background-color: var(--primary-color);
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .channel-item:hover {
            background-color: var(--hover-color);
        }
        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
        }
        .channel-info {
            flex: 1;
        }
        .channel-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .channel-category {
            color: #aaaaaa;
            font-size: 12px;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: var(--primary-color);
            color: var(--text-color);
        }
        .search-btn {
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            color: #aaaaaa;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--accent-color);
        }
        .error-message {
            color: var(--accent-color);
            text-align: center;
            padding: 10px;
            background-color: #333;
            border-radius: 5px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .channel-list {
                grid-template-columns: 1fr;
            }
            .player {
                height: 300px;
            }
        }
    </style>
</head>

        // عناصر الصفحة
        const videoPlayer = document.getElementById("videoPlayer");
        const channelList = document.getElementById("channelList");
        const loadingMessage = document.getElementById("loadingMessage");
        const errorContainer = document.getElementById("errorContainer");
        const playBtn = document.getElementById("playBtn");
        const stopBtn = document.getElementById("stopBtn");
        const reloadBtn = document.getElementById("reloadBtn");
        const vlcBtn = document.getElementById("vlcBtn");
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");

        // تحميل القنوات الافتراضية
        function loadDefaultChannels() {
            displayChannels(defaultChannels);
            loadingMessage.style.display = "none";
        }

        // عرض القنوات في الواجهة
        function displayChannels(channels) {
            channelList.innerHTML = "";
            channels.forEach(channel => {
                const channelItem = document.createElement("div");
                channelItem.className = "channel-item";
                channelItem.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" alt="${channel.name}">
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-category">${channel.group}</div>
                    </div>
                `;
                channelItem.addEventListener("click", () => playChannel(channel.url));
                channelList.appendChild(channelItem);
            });
        }

        // تشغيل القناة
        function playChannel(url) {
            errorContainer.style.display = "none";
            if (Hls.isSupported()) {
                if (videoPlayer.src) {
                    videoPlayer.pause();
                    videoPlayer.src = "";
                }
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(videoPlayer);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play();
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        showError("فشل في تشغيل القناة. حاول استخدام VPN أو فتحها في VLC.");
                        hls.destroy();
                    }
                });
            } else if (videoPlayer.canPlayType("application/vnd.apple.mpegurl")) {
                videoPlayer.src = url;
                videoPlayer.addEventListener("loadedmetadata", () => {
                    videoPlayer.play();
                });
            } else {
                showError("المتصفح لا يدعم تشغيل HLS. حاول استخدام Chrome أو Firefox أو فتح القناة في VLC.");
            }
        }

        // عرض رسالة خطأ
        function showError(message) {
            errorContainer.textContent = message;
            errorContainer.style.display = "block";
        }

        // فتح القناة في VLC
        function openInVLC(url) {
            const vlcUrl = `vlc://${url}`;
            window.open(vlcUrl, "_blank");
        }

        // بحث عن قناة
        function searchChannels() {
            const searchTerm = searchInput.value.toLowerCase();
            if (!searchTerm) {
                displayChannels(defaultChannels);
                return;
            }
            const filteredChannels = defaultChannels.filter(channel =>
                channel.name.toLowerCase().includes(searchTerm) ||
                channel.group.toLowerCase().includes(searchTerm)
            );
            displayChannels(filteredChannels);
        }

        // أحداث الأزرار
        playBtn.addEventListener("click", () => {
            if (videoPlayer.src) {
                videoPlayer.play();
            } else {
                showError("يرجى اختيار قناة أولاً.");
            }
        });

        stopBtn.addEventListener("click", () => {
            videoPlayer.pause();
            videoPlayer.src = "";
        });

        reloadBtn.addEventListener("click", loadDefaultChannels);

        vlcBtn.addEventListener("click", () => {
            if (videoPlayer.src) {
                openInVLC(videoPlayer.src);
            } else {
                showError("يرجى اختيار قناة أولاً.");
            }
        });

        searchBtn.addEventListener("click", searchChannels);
        searchInput.addEventListener("keyup", (e) => {
            if (e.key === "Enter") {
                searchChannels();
            }
        });

        // تحميل القنوات عند بدء الصفحة
        window.addEventListener("load", loadDefaultChannels);
