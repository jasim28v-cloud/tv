<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babes TV - جدول البرامج</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f0f0f; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: linear-gradient(90deg, #e91e63, #9c27b0); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .channel-name { font-size: 24px; font-weight: bold; }
        .epg-table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        .epg-table th, .epg-table td { padding: 15px; text-align: right; border-bottom: 1px solid #333; }
        .epg-table th { background-color: #2d2d2d; color: #e91e63; }
        .time-cell { color: #ffeb3b; font-weight: bold; width: 150px; }
        .current-program { background-color: #3d0016 !important; }
        .live-badge { background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="channel-name" id="ch-name">جاري تحميل القناة...</div>
        <p>الدولة: <span id="ch-country">-</span></p>
    </div>

    <table class="epg-table">
        <thead>
            <tr>
                <th>الوقت (توقيتك المحلي)</th>
                <th>اسم البرنامج</th>
            </tr>
        </thead>
        <tbody id="epg-body">
            </tbody>
    </table>
</div>

<script>
    const url = "https://epg.pw/api/epg.json?channel_id=6875";

    async function fetchEPG() {
        try {
            const response = await fetch(url);
            const data = await response.json();

            // تحديث معلومات القناة
            document.getElementById('ch-name').innerText = data.name;
            document.getElementById('ch-country').innerText = data.country;

            const tbody = document.getElementById('epg-body');
            tbody.innerHTML = '';

            // عرض قائمة البرامج
            data.epg_list.forEach(item => {
                const startTime = new Date(item.start_date);
                const timeString = startTime.toLocaleTimeString('ar-EG', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });

                const row = document.createElement('tr');
                
                // تحديد إذا كان البرنامج يعرض الآن (تقريبياً)
                const now = new Date();
                // ملاحظة: المقارنة هنا تعتمد على تاريخ اليوم مقابل تواريخ الملف (2026)
                
                row.innerHTML = `
                    <td class="time-cell">${timeString}</td>
                    <td>${item.title}</td>
                `;
                tbody.appendChild(row);
            });

        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
            document.getElementById('epg-body').innerHTML = '<tr><td colspan="2">فشل تحميل البيانات. تأكد من اتصال الإنترنت.</td></tr>';
        }
    }

    fetchEPG();
</script>

</body>
</html>
